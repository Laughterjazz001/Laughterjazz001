name: SpecLock

on:
  pull_request:

jobs:
  speclock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Validate spec
        run: npm run speclock:validate

      - name: Check drift
        run: npm run speclock:drift -- --base ${{ github.event.pull_request.base.sha }} --head ${{ github.event.pull_request.head.sha }}